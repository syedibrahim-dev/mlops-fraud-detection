name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      retrain:
        description: "Trigger model retraining"
        required: false
        default: "false"

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  # ── Build Docker image ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraud-detection:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name fraud_test \
            -e MODEL_PATH=data/model.json \
            -p 8000:8000 \
            fraud-detection:${{ github.sha }} || true
          sleep 5
          curl -f http://localhost:8000/health || echo "Health check skipped (no model artifact in CI)"
          docker stop fraud_test || true

  # ── Retrain (manual trigger or drift alert) ─────────────────────────────────
  retrain:
    runs-on: ubuntu-latest
    if: github.event.inputs.retrain == 'true' || github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install kaggle
          kaggle datasets download -d mlg-ulb/creditcardfraud -p data/ --unzip

      - name: Retrain model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python src/train.py --data data/creditcard.csv

      - name: Commit updated model artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model.json data/feature_names.pkl
          git diff --staged --quiet || git commit -m "ci: retrain model [skip ci]"
          git push
